openapi: 3.0.3
info:
  title: Afere API
  version: 2.0.0
  description: >
    Composition-builder API for the Afere medical procedure valuation platform.
    Implements the correct SBN → N CBHPM domain model.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/procedures/search:
    get:
      summary: Search SBN procedures
      description: >
        Returns a deduplicated list of SBN procedures whose name, or any of their
        associated CBHPM codes / descriptions, matches the query.
      operationId: searchProcedures
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search term (procedure name, CBHPM code, or description keyword).
      responses:
        '200':
          description: List of matching SBN procedures.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SBNProcedureResult'
        '400':
          description: Invalid or too-short query.

  /api/procedures/{id}:
    get:
      summary: Get SBN procedure with its CBHPM codes
      description: >
        Returns the full procedure package: name plus all suggested CBHPM codes
        with their default porte from the SBN mapping.
      operationId: getProcedureByID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: SBN procedure ID.
      responses:
        '200':
          description: Procedure detail with suggested CBHPM codes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcedureDetail'
        '404':
          description: Procedure not found.

  /api/calculate:
    post:
      summary: Calculate total valuation for a composition
      description: >
        Accepts a physician-assembled composition of CBHPM codes (each with a
        chosen porte) plus staffing configuration, and returns a per-code
        breakdown and final total.
      operationId: calculate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
      responses:
        '200':
          description: Detailed valuation breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateResponse'
        '400':
          description: Invalid request body.

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    SBNProcedureResult:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          description: Stable identifier for the SBN procedure package.
        name:
          type: string
          description: SBN procedure name (e.g. "CONSULTA + PUNÇÃO LOMBAR").

    CBHPMCodeEntry:
      type: object
      required: [code, description, porte, num_auxiliaries]
      properties:
        code:
          type: string
          description: CBHPM code (e.g. "3.07.15.25-3").
        description:
          type: string
          description: CBHPM description from the SBN mapping.
        porte:
          type: string
          description: Default porte from the SBN mapping (e.g. "2B").
        num_auxiliaries:
          type: integer
          minimum: 0
          description: Maximum number of auxiliary surgeons allowed per CBHPM (0–3).

    ProcedureDetail:
      type: object
      required: [id, name, cbhpm_codes]
      properties:
        id:
          type: string
        name:
          type: string
        cbhpm_codes:
          type: array
          items:
            $ref: '#/components/schemas/CBHPMCodeEntry'

    SelectedCode:
      type: object
      required: [cbhpm_code, description, porte]
      properties:
        cbhpm_code:
          type: string
          description: CBHPM code selected by the physician.
        description:
          type: string
          description: CBHPM description (passed through from the procedure detail).
        porte:
          type: string
          description: Porte chosen by the physician (may differ from the SBN default).

    CalculateRequest:
      type: object
      required: [selected_codes, auxiliaries_count, requires_anesthesia]
      properties:
        selected_codes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SelectedCode'
          description: Physician-selected CBHPM codes with their chosen portes.
        auxiliaries_count:
          type: integer
          minimum: 0
          maximum: 3
          description: Number of auxiliary surgeons (0–3).
        requires_anesthesia:
          type: boolean
          description: Whether an anesthesiologist is required.

    CodeBreakdown:
      type: object
      required: [cbhpm_code, description, porte, base_value]
      properties:
        cbhpm_code:
          type: string
        description:
          type: string
        porte:
          type: string
        base_value:
          type: number
          format: float
          description: Monetary value of this code's porte.

    CalculateResponse:
      type: object
      required:
        - code_breakdown
        - total_base
        - lead_surgeon_fee
        - auxiliaries_fee
        - anesthesiologist_fee
        - final_total
      properties:
        code_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/CodeBreakdown'
          description: Per-code contribution to the total base.
        total_base:
          type: number
          format: float
          description: Sum of all selected code porte values.
        lead_surgeon_fee:
          type: number
          format: float
          description: Lead surgeon fee (100% of total_base).
        auxiliaries_fee:
          type: number
          format: float
          description: Combined auxiliaries fee (30% first + 20% each subsequent).
        anesthesiologist_fee:
          type: number
          format: float
          description: Fixed anesthesiologist fee (if applicable).
        final_total:
          type: number
          format: float
          description: Grand total (lead + auxiliaries + anesthesia).
