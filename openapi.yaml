openapi: 3.1.0
info:
  title: Synvera API
  version: 3.1.0
  description: >
    Composition-builder API for the Synvera medical procedure valuation platform.
    Implements CBHPM 2022 items 4.1, 4.2, and 5.1 for correct multi-procedure
    discounting and auxiliary surgeon remuneration.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/procedures/search:
    get:
      summary: Search SBN procedures
      description: >
        Returns a deduplicated list of SBN procedures whose name, or any of their
        associated CBHPM codes / descriptions, matches the query.
      operationId: searchProcedures
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search term (procedure name, CBHPM code, or description keyword).
      responses:
        '200':
          description: List of matching SBN procedures.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SBNProcedureResult'
        '400':
          description: Invalid or too-short query.

  /api/procedures/{id}:
    get:
      summary: Get SBN procedure with its CBHPM codes
      description: >
        Returns the full procedure package: name plus all suggested CBHPM codes
        with their default porte from the SBN mapping. The porte is read-only;
        the physician selects which codes were performed but cannot change the porte.
      operationId: getProcedureByID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: SBN procedure ID.
      responses:
        '200':
          description: Procedure detail with associated CBHPM codes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcedureDetail'
        '404':
          description: Procedure not found.

  /api/calculate:
    post:
      summary: Calculate total valuation for a composition
      description: >
        Accepts a physician-assembled composition of CBHPM codes plus staffing
        configuration and access route type, then returns a detailed breakdown
        implementing CBHPM 2022 items 4.1/4.2 (multi-procedure discounting) and
        item 5.1 (auxiliary surgeon remuneration at 60/40/30/30%).
      operationId: calculate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
      responses:
        '200':
          description: Detailed valuation breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateResponse'
        '400':
          description: Invalid request body.

  /api/compositions:
    post:
      summary: Save a surgical composition
      description: >
        Persists a reusable surgical template containing the physician's procedural
        setup. No financial values are stored — values are always recalculated fresh
        when the composition is executed.
      operationId: saveComposition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCompositionRequest'
      responses:
        '201':
          description: Composition saved. Returns the public_id for URL construction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveCompositionResponse'
        '400':
          description: Validation error (missing or invalid fields).
    get:
      summary: List saved compositions
      operationId: listCompositions
      responses:
        '200':
          description: Ordered list of compositions (newest first, up to 100).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompositionItem'

  /api/compositions/{id}:
    get:
      summary: Get a composition by public ID
      operationId: getComposition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full composition detail including selected codes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositionDetail'
        '404':
          description: Composition not found.
    put:
      summary: Update an existing composition
      operationId: updateComposition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCompositionRequest'
      responses:
        '200':
          description: Updated composition detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositionDetail'
        '404':
          description: Composition not found.
    delete:
      summary: Delete a composition
      operationId: deleteComposition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Composition deleted.
        '404':
          description: Composition not found.

  /api/calculations:
    post:
      summary: Persist a completed calculation
      description: >
        Saves a completed valuation to the database. The request must include a
        calculation_result with lead_surgeon_fee > 0 to ensure only real valuations
        are persisted. Returns the public_id for the shareable URL.
      operationId: saveCalculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCalculationRequest'
      responses:
        '201':
          description: Calculation saved. Returns the public_id for URL construction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveCalculationResponse'
        '400':
          description: Validation error (missing fields or incomplete valuation).

  /api/calculations/{id}:
    get:
      summary: Retrieve a saved calculation by public ID
      description: >
        Returns the full saved calculation identified by its public UUID.
        The internal database primary key is never exposed.
      operationId: getCalculation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Public UUID of the saved calculation (from SaveCalculationResponse.public_id).
      responses:
        '200':
          description: Saved calculation detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedCalculation'
        '404':
          description: Calculation not found.

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    SBNProcedureResult:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          description: Stable identifier for the SBN procedure package.
        name:
          type: string
          description: SBN procedure name (e.g. "CONSULTA + PUNÇÃO LOMBAR").

    BillingMode:
      type: string
      enum: [PER_PROCEDURE, PER_SEGMENT, PER_VERTEBRA, PER_STRUCTURE]
      description: >
        How a procedure's base value scales with quantity.
        - PER_PROCEDURE: No quantity multiplier (default).
        - PER_SEGMENT: Value is multiplied by number of segments treated.
        - PER_VERTEBRA: Value is multiplied by number of vertebrae treated.
        - PER_STRUCTURE: Value is multiplied by number of structures treated.

    Specialty:
      type: string
      enum: [NEUROSURGERY, SPINE]
      description: >
        Medical domain classification.
        - NEUROSURGERY: General neurosurgery (default).
        - SPINE: Spine-specific procedures with billing variables.

    NormativeBillingMode:
      type: string
      enum: [PER_PROCEDURE, PER_SEGMENT, PER_VERTEBRA, PER_STRUCTURE, PER_STRUCTURE_DECREMENT]
      description: >
        Billing mode declared by the normative modifier layer (ADR-005). Superset of
        BillingMode adding PER_STRUCTURE_DECREMENT (first structure 100%, each additional
        at a fixed percentage — e.g. costectomy). Informational metadata only; the
        valuation engine does not consume it yet (separately-approved activation step).

    CodeModifierInfo:
      type: object
      description: >
        Normative per-code billing modifier sourced from the spine coding manual
        (ADR-005, table cbhpm_code_modifiers). READ-ONLY metadata. As of this release it
        is informational and does NOT affect fee calculations — the engine still bills by
        the catalog billing_mode. Present only for codes that have a normative rule.
      required: [billing_mode, laterality_rule, via_rule, supported_modifiers, confidence]
      properties:
        billing_mode:
          $ref: '#/components/schemas/NormativeBillingMode'
        laterality_rule:
          type: string
          enum: [NONE, NO_DUPLICATE, BILATERAL_DOUBLE, CBHPM_4_3]
          description: How laterality affects billing for this code.
        via_rule:
          type: string
          enum: [CBHPM_DEFAULT, SPINE_50]
          description: Access-route regime when this code is an additional procedure.
        decrement_pct:
          type: number
          description: For PER_STRUCTURE_DECREMENT — percentage charged per additional structure.
        max_quantity:
          type: integer
          description: UI cap for the quantity selector; omitted when unbounded.
        supported_modifiers:
          type: array
          items:
            type: string
          description: UI hints, e.g. ["segment_count", "endoscopic_access"].
        source_document:
          type: string
        source_version:
          type: string
        source_page:
          type: integer
        source_excerpt:
          type: string
          description: Verbatim manual excerpt justifying the rule.
        confidence:
          type: string
          enum: [CONFIRMED, INFERRED, WEAK]

    Laterality:
      type: string
      enum: [UNILATERAL, BILATERAL]
      description: >
        Whether procedure is billed for one side or both.
        - UNILATERAL: One side (multiplier = 1).
        - BILATERAL: Both sides (multiplier = 2, if applicable).

    CBHPMCodeEntry:
      type: object
      required: [code, description, porte, num_auxiliaries, billing_mode, specialty, laterality_support]
      properties:
        code:
          type: string
          description: CBHPM code (e.g. "3.07.15.25-3").
        description:
          type: string
          description: CBHPM description from the SBN mapping.
        porte:
          type: string
          description: Porte for this code as defined in the SBN catalog (e.g. "7A"). Read-only.
        num_auxiliaries:
          type: integer
          minimum: 0
          description: Maximum number of auxiliary surgeons allowed per CBHPM (0–4).
        billing_mode:
          $ref: '#/components/schemas/BillingMode'
        specialty:
          $ref: '#/components/schemas/Specialty'
        laterality_support:
          type: boolean
          description: Whether bilateral billing is explicitly supported for this procedure.
        modifier:
          $ref: '#/components/schemas/CodeModifierInfo'

    ProcedureDetail:
      type: object
      required: [id, name, cbhpm_codes]
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          $ref: '#/components/schemas/Specialty'
        source:
          $ref: '#/components/schemas/ProcedureSource'
        cbhpm_codes:
          type: array
          items:
            $ref: '#/components/schemas/CBHPMCodeEntry'

    ProcedureSource:
      type: object
      description: Provenance of the procedure ficha (which manual it was imported from).
      required: [document, version]
      properties:
        document:
          type: string
          description: Source manual title (spine coding manual or SBN neurosurgery manual).
        version:
          type: string
          description: Source manual edition/year (e.g. "3ª ed. 2025", "2018").

    AccessRouteType:
      type: string
      enum: [same, different]
      description: >
        Whether all selected procedures were performed via the same access route
        (CBHPM 4.1 – 50% discount on secondary procedures) or different access
        routes (CBHPM 4.2 – 70% discount on secondary procedures).

    SelectedCode:
      type: object
      required: [cbhpm_code, description, porte, billing_mode, specialty, laterality_support]
      properties:
        cbhpm_code:
          type: string
          description: CBHPM code selected by the physician.
        description:
          type: string
          description: CBHPM description (passed through from the procedure detail).
        porte:
          type: string
          description: Porte for this code (from the SBN catalog, not editable by the physician).
        billing_mode:
          $ref: '#/components/schemas/BillingMode'
          description: Billing mode inherited from procedure catalog.
        specialty:
          $ref: '#/components/schemas/Specialty'
          description: Specialty classification inherited from procedure catalog.
        laterality_support:
          type: boolean
          description: Whether bilateral billing is applicable for this code.
        quantity_selected:
          type: integer
          minimum: 1
          default: 1
          description: Number of segments/vertebrae/structures treated (only if billing_mode allows).
        laterality:
          $ref: '#/components/schemas/Laterality'
          default: UNILATERAL
          description: Whether this procedure is billed unilaterally or bilaterally.

    BillingModifiers:
      type: object
      description: >
        Spine-specific billing variables. Only applicable fields based on selected procedures' billing modes are used.
        Omit fields that do not apply; defaults (quantity_selected=1, laterality=UNILATERAL) are used.
      properties:
        quantity_selected:
          type: integer
          minimum: 1
          default: 1
          description: Number of segments/vertebrae/structures treated (only if billing_mode allows).
        laterality:
          $ref: '#/components/schemas/Laterality'
          default: UNILATERAL
          description: Whether procedure is billed unilaterally or bilaterally (only if supported).
        anesthesia_assistant:
          type: boolean
          description: >
            Whether a second anesthesiologist (60%, CBHPM p.140 item 8) was requested. Persisted so a
            saved composition reproduces the same anesthesia fee on reload. Applied only for AN7/AN8.
        vertebral_region:
          type: string
          enum: [cervical, thoracic, lumbar, lumbosacral, sacral]
          description: Anatomical region (informational metadata, no billing effect).
        surgical_approach:
          type: string
          enum: [anterior, posterior, posterolateral, lateral, minimally_invasive]
          description: Surgical technique (informational metadata, no billing effect).
        fusion_status:
          type: string
          enum: [decompression_only, fusion, hybrid]
          description: Fusion configuration (informational metadata, no billing effect).
        implant_category:
          type: string
          enum: [graft, hardware, arthroplasty, neural_device]
          description: Type of implant (informational metadata, no billing effect).
        osteoporosis_aware:
          type: boolean
          description: Whether osteoporosis is documented (informational metadata, no billing effect).
        clinical_context:
          type: string
          enum: [traumatic, degenerative, neoplastic, infectious, deformity, revision]
          description: Clinical diagnosis context (informational metadata, no billing effect).

    CalculateRequest:
      type: object
      required: [selected_codes, auxiliaries_count, requires_anesthesia, access_route_type]
      properties:
        selected_codes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SelectedCode'
          description: Physician-selected CBHPM codes.
        auxiliaries_count:
          type: integer
          minimum: 0
          maximum: 4
          description: Number of auxiliary surgeons (0–4).
        requires_anesthesia:
          type: boolean
          description: >
            Legacy flag; ignored when the server derives the anesthesiologist fee from the
            per-code anesthetic porte (the production path). Retained for backward compatibility.
        anesthesia_assistant:
          type: boolean
          description: >
            Request a second anesthesiologist for AN7/AN8 (CBHPM p.140 item 8): 60% of the
            anesthesiologist fee. Other item-8 triggers (CEC, >6h, …) are supplied via
            anesthesia_auxiliary_justification.
        anesthesia_bilateral:
          type: boolean
          description: >
            USER_SELECTABLE: the anesthesia covered a bilateral surgical act with no specific
            bilateral CBHPM code (p.140 item 7). Adds 70% of the principal anesthetic porte to the
            anesthesiologist fee. Ignored when a selected code is already a bilateral code.
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        urgency_emergency:
          type: boolean
          description: >
            When true, applies the CBHPM item 2 urgency/emergency 30% surcharge
            to all medical fees (surgeon, auxiliaries, anesthesiologist).
            Applicable for acts performed 19h–7h, on weekends, or on holidays.
        modifiers:
          $ref: '#/components/schemas/BillingModifiers'
          description: Spine-specific billing variables (optional).
        adjustments:
          type: array
          items:
            type: string
          description: >
            Array of CBHPM adjustment codes to apply to the calculation.
            Valid codes: emergency_special_hours, pediatric_low_weight_or_premature,
            pediatric_neonate_or_infant, pediatric_child_under_12.
            Percentages are additive (e.g., two 30% adjustments = 60%, not 69%).
        anesthesia_auxiliary_justification:
          $ref: '#/components/schemas/AnesthesiaAuxiliaryJustification'

    AnesthesiaAuxiliaryJustification:
      type: object
      description: >
        USER_SELECTABLE non-derivable clinical facts (informed by the surgeon) that authorise a
        second anesthesiologist (+60% of the principal anesthetic porte), per CBHPM 2022 p.140
        item 8, beyond the auto-detectable AN7/AN8 triggers. All fields default to false.
      properties:
        cec:
          type: boolean
          description: Cardiopulmonary bypass (circulação extracorpórea).
        duration_over_6h:
          type: boolean
          description: Surgery lasting more than 6 hours.
        surgical_neonatology:
          type: boolean
          description: Surgical neonatology (neonatologia cirúrgica).
        bariatric_gastroplasty:
          type: boolean
          description: Gastroplasty for morbid obesity (gastroplastia para obesidade mórbida).

    CodeBreakdown:
      type: object
      required: [cbhpm_code, description, porte, base_value, is_principal, billing_mode, quantity_selected, quantity_multiplier, laterality, laterality_multiplier, adjusted_value]
      properties:
        cbhpm_code:
          type: string
        description:
          type: string
        porte:
          type: string
        base_value:
          type: number
          format: float
          description: Full monetary value of this code's porte (before any discount).
        is_principal:
          type: boolean
          description: True for the highest-value code selected as the principal procedure.
        billing_mode:
          $ref: '#/components/schemas/BillingMode'
          description: Billing mode that determines quantity multiplier.
        quantity_selected:
          type: integer
          description: Number of segments/vertebrae/structures selected (1 if not applicable).
        quantity_multiplier:
          type: number
          format: float
          description: Multiplier applied based on quantity (e.g., 1.0, 2.0, 3.0).
        laterality:
          $ref: '#/components/schemas/Laterality'
          description: Whether billed unilaterally or bilaterally.
        laterality_multiplier:
          type: number
          format: float
          description: Multiplier applied based on laterality (1.0 or 2.0).
        adjusted_value:
          type: number
          format: float
          description: base_value × quantity_multiplier × laterality_multiplier (before CBHPM discounts).

    AuxiliaryFee:
      type: object
      required: [position, percentage, fee]
      properties:
        position:
          type: integer
          description: Auxiliary position (1 = first, 2 = second, etc.).
        percentage:
          type: number
          format: float
          description: Percentage applied (60, 40, 30, or 30).
        fee:
          type: number
          format: float
          description: Calculated fee for this auxiliary.

    AppliedAdjustment:
      type: object
      required: [code, label, percentage, source]
      properties:
        code:
          type: string
          description: Adjustment code identifier.
        label:
          type: string
          description: Human-readable label for the adjustment.
        percentage:
          type: number
          format: float
          description: Percentage value of this adjustment.
        source:
          type: string
          description: Source reference (e.g., CBHPM manual section).

    SurgeonBreakdown:
      type: object
      required: [principal_value, additional_gross, discount_rate, additional_discounted, surgeon_total]
      properties:
        principal_value:
          type: number
          format: float
          description: Monetary value of the principal (highest-value) procedure.
        additional_gross:
          type: number
          format: float
          description: Sum of all non-principal procedure values before applying the CBHPM discount.
        discount_rate:
          type: number
          format: float
          description: Discount rate applied to additional procedures (0.50 for same route, 0.70 for different routes).
        additional_discounted:
          type: number
          format: float
          description: Sum of additional procedure values after applying the discount.
        surgeon_total:
          type: number
          format: float
          description: Final surgeon fee (principal_value + additional_discounted).

    CalculateResponse:
      type: object
      required:
        - code_breakdown
        - access_route_type
        - surgeon_breakdown
        - lead_surgeon_fee
        - individual_auxiliary_fees
        - auxiliaries_fee
        - anesthesiologist_fee
        - final_total
        - total_base
        - selected_adjustments
        - total_adjustment_percentage
        - adjustment_value
      properties:
        code_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/CodeBreakdown'
          description: Per-code contribution with principal flag.
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        surgeon_breakdown:
          $ref: '#/components/schemas/SurgeonBreakdown'
        lead_surgeon_fee:
          type: number
          format: float
          description: Final surgeon fee (equals surgeon_breakdown.surgeon_total).
        individual_auxiliary_fees:
          type: array
          items:
            $ref: '#/components/schemas/AuxiliaryFee'
          description: Per-auxiliary fee details (CBHPM 5.1 – 60/40/30/30%).
        auxiliaries_fee:
          type: number
          format: float
          description: Sum of all individual auxiliary fees.
        anesthesiologist_fee:
          type: number
          format: float
          description: Anesthesiologist fee, derived from the principal anesthetic porte (CBHPM p.139–140).
        anesthesia_porte:
          type: integer
          description: >
            Principal anesthetic porte used (AN0–AN8; 0 when none). Lets the client offer the
            anesthesia assistant only when applicable (AN7/AN8).
        anesthesia_assistant_fee:
          type: number
          format: float
          description: Second-anesthesiologist fee (60%), when requested and applicable (A9). 0 otherwise.
        anesthesia_assistant_applied:
          type: boolean
          description: Whether the second-anesthesiologist (60%) fee was applied.
        anesthesia_assistant_reasons:
          type: array
          items:
            type: string
          description: >
            Reasons the assistant was applied — any of: AN7, AN8, cec, duration_over_6h,
            surgical_neonatology, bariatric_gastroplasty. Empty when not applied (CBHPM p.140 item 8).
        anesthesia_bilateral_applied:
          type: boolean
          description: >
            Whether the bilateral +70% (CBHPM p.140 item 7) was added to the anesthesiologist fee.
        final_total:
          type: number
          format: float
          description: Grand total (lead_surgeon_fee + auxiliaries_fee + anesthesiologist_fee).
        total_base:
          type: number
          format: float
          description: Simple sum of all selected code porte values (before discounting). Retained for compatibility.
        urgency_emergency_applied:
          type: boolean
          description: Whether the CBHPM item 2 urgency/emergency surcharge was applied.
        urgency_emergency_percentage:
          type: number
          format: float
          description: Surcharge percentage (30.0 when applied, 0 otherwise).
        urgency_emergency_value:
          type: number
          format: float
          description: Absolute monetary value of the surcharge added to the total.
        selected_adjustments:
          type: array
          items:
            $ref: '#/components/schemas/AppliedAdjustment'
          description: Array of CBHPM adjustments applied to this calculation.
        total_adjustment_percentage:
          type: number
          format: float
          description: Combined percentage from all applied adjustments (additive, not multiplicative).
        adjustment_value:
          type: number
          format: float
          description: Absolute monetary value of all combined adjustments.

    SaveCompositionRequest:
      type: object
      required: [name, sbn_procedure_name, selected_codes, auxiliaries_count, requires_anesthesia, access_route_type]
      properties:
        name:
          type: string
          minLength: 1
          description: Physician-defined label for this composition.
        sbn_procedure_id:
          type: string
          description: SBN catalog ID of the primary procedure (optional).
        sbn_procedure_name:
          type: string
          description: SBN procedure name as displayed to the physician.
        selected_codes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SelectedCode'
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        auxiliaries_count:
          type: integer
          minimum: 0
          maximum: 4
        requires_anesthesia:
          type: boolean
        adjustments:
          type: array
          items:
            type: string
          description: >
            Array of CBHPM adjustment codes to persist in the composition.
            Valid codes: emergency_special_hours, pediatric_low_weight_or_premature,
            pediatric_neonate_or_infant, pediatric_child_under_12.
        modifiers:
          $ref: '#/components/schemas/BillingModifiers'
          description: Spine-specific billing variables to persist in the composition (optional).

    SaveCompositionResponse:
      type: object
      required: [public_id, created_at]
      properties:
        public_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    CompositionItem:
      type: object
      required: [public_id, name, sbn_procedure_name, access_route_type, auxiliaries_count, requires_anesthesia, created_at]
      description: Lightweight composition projection for list responses (no selected codes).
      properties:
        public_id:
          type: string
          format: uuid
        name:
          type: string
        sbn_procedure_id:
          type: string
        sbn_procedure_name:
          type: string
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        auxiliaries_count:
          type: integer
        requires_anesthesia:
          type: boolean
        created_at:
          type: string
          format: date-time

    CompositionDetail:
      type: object
      required: [public_id, name, sbn_procedure_name, selected_codes, access_route_type, auxiliaries_count, requires_anesthesia, adjustments, created_at, updated_at]
      description: Full composition including selected CBHPM codes and spine-specific modifiers.
      properties:
        public_id:
          type: string
          format: uuid
        name:
          type: string
        sbn_procedure_id:
          type: string
        sbn_procedure_name:
          type: string
        selected_codes:
          type: array
          items:
            $ref: '#/components/schemas/SelectedCode'
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        auxiliaries_count:
          type: integer
        requires_anesthesia:
          type: boolean
        adjustments:
          type: array
          items:
            type: string
          description: Array of CBHPM adjustment codes active in this composition.
        modifiers:
          $ref: '#/components/schemas/BillingModifiers'
          description: Spine-specific billing variables persisted in composition (optional).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SaveCalculationRequest:
      type: object
      required: [procedure_name, selected_codes, auxiliaries_count, requires_anesthesia, access_route_type, calculation_result]
      properties:
        procedure_name:
          type: string
          minLength: 1
          description: SBN procedure name as displayed to the physician.
        procedure_sbn_code:
          type: string
          description: SBN catalog ID (optional; used for future cross-referencing).
        selected_codes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SelectedCode'
        auxiliaries_count:
          type: integer
          minimum: 0
          maximum: 4
        requires_anesthesia:
          type: boolean
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        calculation_result:
          $ref: '#/components/schemas/CalculateResponse'
          description: The completed valuation result. lead_surgeon_fee must be > 0.
        modifiers:
          $ref: '#/components/schemas/BillingModifiers'
          description: Spine-specific billing variables used in this calculation (optional).

    SaveCalculationResponse:
      type: object
      required: [public_id, created_at]
      description: >
        Only the public_id is returned. Use it to construct the shareable URL:
        https://synvera.app/calc/{public_id}
      properties:
        public_id:
          type: string
          format: uuid
          description: UUID v4 public identifier for this calculation. Never the internal DB primary key.
        created_at:
          type: string
          format: date-time

    SavedCalculation:
      type: object
      required: [public_id, procedure_name, selected_cbhpm_codes, access_route_type, auxiliaries_count, requires_anesthesia, surgeon_value, auxiliaries_total_value, anesthesiologist_value, team_total_value, calculation_breakdown, created_at]
      description: The full saved calculation. The internal DB primary key is never included. Includes spine-specific modifiers if applicable.
      properties:
        public_id:
          type: string
          format: uuid
        procedure_name:
          type: string
        procedure_sbn_code:
          type: string
        selected_cbhpm_codes:
          type: array
          items:
            $ref: '#/components/schemas/SelectedCode'
        access_route_type:
          $ref: '#/components/schemas/AccessRouteType'
        auxiliaries_count:
          type: integer
        requires_anesthesia:
          type: boolean
        surgeon_value:
          type: number
          format: float
        auxiliaries_total_value:
          type: number
          format: float
        anesthesiologist_value:
          type: number
          format: float
        team_total_value:
          type: number
          format: float
        calculation_breakdown:
          description: Original CalculateResponse JSON preserved verbatim for auditing.
        modifiers:
          $ref: '#/components/schemas/BillingModifiers'
          description: Spine-specific billing variables used in this calculation (optional).
        created_at:
          type: string
          format: date-time
