<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ProcediPriz icon</title>
  <desc id="desc">A teal circular medical badge with a white pulse line.</desc>
  <defs>
    <linearGradient id="badge" x1="116" y1="82" x2="386" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#208f9a"/>
      <stop offset="0.56" stop-color="#0f6874"/>
      <stop offset="1" stop-color="#094654"/>
    </linearGradient>
    <linearGradient id="rim" x1="96" y1="72" x2="418" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74d2d8"/>
      <stop offset="0.45" stop-color="#2ba1ab"/>
      <stop offset="1" stop-color="#063846"/>
    </linearGradient>
    <radialGradient id="light" cx="31%" cy="21%" r="58%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#062d38" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0a2330"/>
  <path d="M0 512 512 0v512z" fill="#102f3e" opacity="0.7"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="196" fill="url(#rim)"/>
    <circle cx="256" cy="256" r="181" fill="url(#badge)"/>
    <circle cx="256" cy="256" r="181" fill="url(#light)"/>
    <circle cx="256" cy="256" r="180" fill="none" stroke="#98edf0" stroke-opacity="0.34" stroke-width="3"/>
  </g>

  <path
    d="M146 270h61l23-86 47 148 30-102 19 40h41"
    fill="none"
    stroke="#f4fbfb"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M146 270h61l23-86 47 148 30-102 19 40h41"
    fill="none"
    stroke="#d8ffff"
    stroke-opacity="0.48"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
